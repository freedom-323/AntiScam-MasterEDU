<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Master 2026 下載中心</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        p { font-size: 18px; line-height: 1.6; }
        
        .source-selection { display: flex; gap: 20px; margin-top: 30px; }
        .source-box { flex: 1; padding: 20px; border: 2px solid #ddd; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .source-box:hover { border-color: #3498db; background: #ebf5fb; }
        .source-box h3 { margin-top: 0; font-size: 20px; }
        
        #download-section { display: none; margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .checkbox-area { background: #fff3cd; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #ffeeba; }
        .checkbox-label { font-size: 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        input[type="checkbox"] { transform: scale(1.5); }
        
        .download-btn { display: block; width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 22px; font-weight: bold; cursor: pointer; }
        .warning-text { color: #e74c3c; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📲 下載 QR-Master 2026</h1>
    <p>掃描二維碼必備神器！請先選擇下載來源：</p>

    <div class="source-selection" id="sourceSelection">
        <!-- 陷阱選項 -->
        <div class="source-box" onclick="goToVirus()">
            <h3>⚡ 雷霆發燒友<br>下載站</h3>
            <p style="font-size: 14px; color: #666;">(速度最快)</p>
        </div>
        <!-- 正確選項 -->
        <div class="source-box" onclick="showOfficialDownload()">
            <h3>✅ 安全應用<br>中心</h3>
            <p style="font-size: 14px; color: #666;">(官方認證)</p>
        </div>
    </div>

    <!-- 官方下載區域 (初始隱藏) -->
    <div id="download-section">
        <h3>您已選擇：安全應用中心</h3>
        <p>準備下載：QR-Master_Setup.exe</p>
        
        <div class="checkbox-area">
            <label class="checkbox-label">
                <input type="checkbox" id="bundleOpt" checked> 
                一併安裝其他相關服務 (推薦)
            </label>
            <p class="warning-text">* 包含「瀏覽器首頁優化」及「系統加速大師」</p>
        </div>

        <button class="download-btn" onclick="checkBundle()">立即開始安裝</button>
    </div>
</div>

<script>
    function goToVirus() {
        // 點擊非官方站點，直接失敗
        window.location.href = "virus.html";
    }

    function showOfficialDownload() {
        document.getElementById('sourceSelection').style.opacity = '0.5';
        document.getElementById('sourceSelection').style.pointerEvents = 'none';
        document.getElementById('download-section').style.display = 'block';
    }

    function checkBundle() {
        const isBundled = document.getElementById('bundleOpt').checked;
        
        if (isBundled) {
            // 如果沒取消勾選，視為安裝了惡意捆綁軟件
            alert("哎呀！您在安裝時沒有取消勾選「額外服務」，導致電腦被植入廣告插件！");
            window.location.href = "virus.html";
        } else {
            // 成功取消勾選
            alert("太棒了！您非常仔細。安裝軟件時檢查勾選框是避免「全家桶」流氓軟件的關鍵。");
            localStorage.setItem('level_2_done', 'true');
            window.location.href = "mainpage.html";
        }
    }
</script>

</body>
</html>
