<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Master 下載</title>
    <style>
        body { font-family: sans-serif; background: #f2f2f7; padding: 20px; }
        .card { max-width: 500px; background: white; margin: 40px auto; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .source { border: 2px solid #eee; border-radius: 15px; padding: 20px; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        .source:hover { border-color: #007aff; }
        #thunder-site { display:none; position:fixed; inset:0; background:white; z-index:999; text-align:center; padding-top:100px; }
    </style>
</head>
<body>
    <div id="thunder-site">
        <h1 style="color:#ff3b30;">⚡ 雷霆極速下載站</h1>
        <p>正在為您加速：QR-Master_Setup.exe</p>
        <button onclick="location.href='virus.html'" style="background:#ff3b30; color:white; border:none; padding:20px 40px; border-radius:50px; font-size:24px; font-weight:bold; cursor:pointer;">🚀 立即下載 (無法返回)</button>
        <p style="color:#999; margin-top:50px;">廣告：您的電腦可能已變慢，點此清理</p>
    </div>

    <div class="card" id="main-card">
        <h2>📲 下載 QR-Master</h2>
        <p>請選擇官方授權渠道：</p>
        <div class="source" onclick="showThunder()">
            <h3 style="margin:0; color:#ff9500;">⚡ 雷霆發燒友站</h3>
            <p style="margin:5px 0; color:#888;">(免排隊，速度極快)</p>
        </div>
        <div class="source" onclick="showOfficial()">
            <h3 style="margin:0; color:#34c759;">✅ 安全應用中心</h3>
            <p style="margin:5px 0; color:#888;">(官方認證，安全檢查)</p>
        </div>

        <div id="official-ui" style="display:none; margin-top:30px; border-top:1px solid #eee; padding-top:20px;">
            <label style="font-size:18px; display:block; background:#fff9c4; padding:15px; border-radius:10px;">
                <input type="checkbox" id="bundle" checked> 一併安裝相關插件 (推薦)
            </label>
            <button onclick="check()" style="background:#34c759; color:white; border:none; width:100%; padding:15px; border-radius:12px; margin-top:15px; font-size:18px;">開始安裝</button>
        </div>
    </div>

    <script>
        function showThunder() {
            document.getElementById('thunder-site').style.display = 'block';
            history.pushState(null,null,location.href);
            window.onpopstate = () => { history.go(1); alert("必須完成下載！"); };
        }
        function showOfficial() { document.getElementById('official-ui').style.display = 'block'; }
        function check() {
            if(document.getElementById('bundle').checked) {
                alert("失敗！您安裝了惡意捆綁插件。");
                location.href = 'virus.html';
            } else {
                alert("通關！仔細檢查勾選框是好習慣。");
                localStorage.setItem('level_2_done', 'true');
                location.href = 'mainpage.html';
            }
        }
    </script>
</body>
</html>
