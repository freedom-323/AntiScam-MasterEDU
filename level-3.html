<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi 設置</title>
    <style>
        body { font-family: sans-serif; background: #f2f2f7; margin: 0; }
        .list { max-width: 400px; background: white; margin: 20px auto; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .item { padding: 20px; border-bottom: 1px solid #f2f2f7; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .item:active { background: #f2f2f7; }
        .name { font-size: 18px; font-weight: 600; }
        .speed { font-size: 14px; color: #8e8e93; }
    </style>
</head>
<body>
    <div style="text-align:center; padding:40px 20px;">
        <h1 style="margin:0;">Wi-Fi 設置</h1>
        <p style="color:#8e8e93;">請連接最安全的網絡</p>
    </div>
    <div class="list">
        <div class="item" onclick="location.href='virus.html'">
            <div><div class="name">🔓 Public Superspeed</div><div class="speed">速度：3 Mb/s (極速)</div></div>
            <span style="font-size:24px;">📶</span>
        </div>
        <div class="item" onclick="win()">
            <div><div class="name">🔒 My home</div><div class="speed">速度：750 kb/s (安全)</div></div>
            <span style="font-size:24px;">📶</span>
        </div>
    </div>
    <script>
        function win() {
            alert("正確！不要被免費、高速但未加密的公共 WiFi 誘惑。");
            localStorage.setItem('level_3_done', 'true');
            location.href = 'mainpage.html';
        }
    </script>
</body>
</html>
