<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immediate Chat 下載</title>
    <style>
        body { font-family: sans-serif; background: #f2f2f7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .phone { width: 350px; background: white; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 30px; text-align: center; }
        .btn { background: #007aff; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .safe-link { color: #8e8e93; display: block; margin-top: 20px; text-decoration: none; font-size: 16px; }
        /* 模擬 Chrome 警告 */
        #mock-chrome { display: none; position: fixed; top: 20px; width: 90%; max-width: 350px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 15px; z-index: 100; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div id="mock-chrome">
        <p style="color:#d93025; font-weight:bold; margin:0;">⚠️ 此檔案可能會損害您的裝置</p>
        <p style="font-size:14px; margin:10px 0;">您仍要保留 super-virus.zip 嗎？</p>
        <div style="text-align:right;">
            <button onclick="location.reload()" style="background:#f1f3f4; border:none; padding:8px 12px; border-radius:4px;">放棄</button>
            <button onclick="location.href='virus.html'" style="background:#d93025; color:white; border:none; padding:8px 12px; border-radius:4px; margin-left:5px;">保留</button>
        </div>
    </div>

    <div class="phone">
        <div style="font-size:60px;">💬</div>
        <h2>Immediate Chat</h2>
        <p style="color:#666;">版本 2026.1 已推出<br>請更新以確保通訊不中斷</p>
        <button class="btn" onclick="firstAlert()">立即下載更新</button>
        <a href="#" class="safe-link" onclick="win()">這可能是偽造的，我不下載</a>
    </div>

    <script>
        function firstAlert() {
            alert("系統提示：偵測到此文件含有高危病毒！");
            document.getElementById('mock-chrome').style.display = 'block';
        }
        function win() {
            alert("正確！看到不明下載提示應立即停止。");
            localStorage.setItem('level_1_done', 'true');
            location.href = 'mainpage.html';
        }
    </script>
</body>
</html>
