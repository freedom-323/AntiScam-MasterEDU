<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ 網絡安全大挑戰</title>
    <style>
        :root { --primary: #007aff; --success: #34c759; --bg: #f2f2f7; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        h1 { font-size: 32px; color: #1c1c1e; margin-bottom: 5px; text-align: center; }
        .subtitle { color: #8e8e93; font-size: 18px; margin-bottom: 30px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto; }
        .card { 
            background: white; border-radius: 20px; padding: 30px 15px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; position: relative;
        }
        .card:active { transform: scale(0.95); }
        .card.completed { border: 3px solid var(--success); background: #f2faf3; }
        .card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .num { font-size: 40px; font-weight: 800; color: var(--primary); display: block; }
        .name { font-size: 18px; font-weight: 600; color: #3a3a3c; margin-top: 10px; display: block; }
        .status { position: absolute; top: 8px; right: 8px; font-size: 12px; font-weight: bold; color: var(--success); }
        .reset { margin-top: 50px; color: #8e8e93; border: none; background: none; cursor: pointer; text-decoration: underline; width: 100%; }
    </style>
</head>
<body>
    <h1>🛡️ 網絡安全大挑戰</h1>
    <p class="subtitle">點擊關卡開始練習，保護您的個人資料</p>
    <div class="grid" id="grid"></div>
    <button class="reset" onclick="if(confirm('確定要清除進度嗎？')){localStorage.clear();location.reload();}">重置所有進度</button>

    <script>
        const levels = ["通訊軟件更新", "安裝 QR 工具", "連接 Wi-Fi", "XYZ銀行郵件", "待定關卡 5", "待定關卡 6", "待定關卡 7", "待定關卡 8", "待定關卡 9", "終極測試"];
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 10; i++) {
            const isDone = localStorage.getItem(`level_${i}_done`) === 'true';
            const isLocked = i > 1 && localStorage.getItem(`level_${i-1}_done`) !== 'true';
            const card = document.createElement('div');
            card.className = `card ${isDone ? 'completed' : ''} ${isLocked ? 'locked' : ''}`;
            card.innerHTML = `${isDone?'<span class="status">已完成</span>':''}<span class="num">${i}</span><span class="name">${levels[i-1]}</span>`;
            card.onclick = () => {
                if(isLocked) return alert("請先完成前一關！");
                if(isDone && !confirm("重新練習此關卡？")) return;
                window.location.href = `level-${i}.html`;
            };
            grid.appendChild(card);
        }
    </script>
</body>
</html>
